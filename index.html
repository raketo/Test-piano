<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      background: white;
      overflow: hidden;
      font-family: sans-serif;
    }
    canvas {
      display: block;
    }
    #resetBtn, #pauseBtn {
      position: absolute;
      top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #22c55e;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      z-index: 10;
    }
    #resetBtn {
      left: 20px;
    }
    #pauseBtn {
      left: 120px;
    }
    #resetBtn:hover, #pauseBtn:hover {
      background-color: #16a34a;
    }
  </style>
</head>
<body>
<button id="resetBtn">Reset</button>
<button id="pauseBtn">Pause</button>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const resetBtn = document.getElementById("resetBtn");
const pauseBtn = document.getElementById("pauseBtn");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// --- Fake notes ---
const notes = [
  { pitch: 60, start: 0, duration: 1, color: "#22c55e", label: "C" },
  { pitch: 62, start: 1, duration: 1, color: "#f59e0b", label: "D" },
  { pitch: 64, start: 2, duration: 1, color: "#8b5cf6", label: "E" },
  { pitch: 65, start: 3, duration: 1, color: "#3b82f6", label: "F" },
  { pitch: 67, start: 4, duration: 2, color: "#ef4444", label: "G" },
];

// --- Mapping ---
const pixelsPerSecond = 120;
const baseY = 200;

function pitchToY(pitch) {
  return baseY - (pitch - 60) * 6;
}

// --- Helper function to draw rounded rectangles ---
function roundedRect(x, y, w, h, radius) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + w - radius, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
  ctx.lineTo(x + w, y + h - radius);
  ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
  ctx.lineTo(x + radius, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
  ctx.fill();
}

// --- Timing ---
let startTime = performance.now();
let pausedTime = 0;
let isPaused = false;

function resetAnimation() {
  startTime = performance.now();
  pausedTime = 0;
  isPaused = false;
  pauseBtn.textContent = "Pause";
}

function togglePause() {
  if (isPaused) {
    startTime = performance.now() - pausedTime * 1000;
    isPaused = false;
    pauseBtn.textContent = "Pause";
  } else {
    pausedTime = (performance.now() - startTime) / 1000;
    isPaused = true;
    pauseBtn.textContent = "Resume";
  }
}

resetBtn.addEventListener("click", resetAnimation);
pauseBtn.addEventListener("click", togglePause);

function draw() {
  const now = isPaused ? pausedTime : (performance.now() - startTime) / 1000;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // --- Staff lines ---
  ctx.strokeStyle = "#000";
  for (let i = 0; i < 5; i++) {
    const y = baseY - i * 12;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  // --- Notes ---
  notes.forEach(note => {
    const x = canvas.width / 3 + (note.start - now) * pixelsPerSecond;
    const y = pitchToY(note.pitch);
    const w = note.duration * pixelsPerSecond;
    const h = 20;

    ctx.fillStyle = note.color;
    roundedRect(x, y, w, h, 6);

    ctx.fillStyle = "#000";
    ctx.font = "12px sans-serif";
    ctx.fillText(note.label, x + 5, y + 14);
  });

  // --- Playhead line ---
  ctx.strokeStyle = "lime";
  ctx.beginPath();
  ctx.moveTo(canvas.width / 3, 0);
  ctx.lineTo(canvas.width / 3, canvas.height);
  ctx.stroke();

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
